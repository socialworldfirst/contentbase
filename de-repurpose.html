<script>
function b64ToBytes(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a}
async function deriveKey(pw,salt,it){const e=new TextEncoder();const bk=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"])}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const k=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},k,b64ToBytes(b.ciphertext));return new TextDecoder().decode(p)}
function wire(){document.querySelectorAll('details.sec').forEach(d=>{d.addEventListener('toggle',()=>{if(d.open)document.querySelectorAll('details.sec').forEach(o=>{if(o!==d)o.open=false})})})}
async function reveal(h){document.getElementById('content').innerHTML=h;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');wire()}
async function gateSubmit(e){e.preventDefault();const i=document.getElementById('gate-input'),er=document.getElementById('gate-err');er.textContent='';try{const h=await decryptPayload(i.value);await reveal(h);try{localStorage.setItem('wf_de_pw',i.value)}catch(_){}}catch(x){er.textContent='wrong password';i.value='';i.focus()}return false}
(async()=>{try{const c=localStorage.getItem('wf_de_pw');if(c){await reveal(await decryptPayload(c))}}catch(_){try{localStorage.removeItem('wf_de_pw')}catch(_){}}})();
</script></body></html>
